# /etc/portage/make.conf — main Gentoo configuration file
#
# This file mirrors the standard Gentoo make.conf format.
# portage-ng reads it via gentoo:load/0 and maps the values
# into the preference system (same effect as config:gentoo_env/2).
#
# Syntax: KEY="value"  (Bash-style, supports #-comments)
#
# See: https://wiki.gentoo.org/wiki//etc/portage/make.conf

# Global USE flags (space-separated, -flag to disable)
USE="X alsa dbus truetype -systemd -introspection"

# Target architecture keywords (~ = testing, no prefix = stable)
ACCEPT_KEYWORDS="~amd64"

# License acceptance (* = all, @FREE = FSF/OSI-approved)
ACCEPT_LICENSE="-* @FREE"

# Hardware-specific USE_EXPAND variables
VIDEO_CARDS="vmware vesa vga"
INPUT_DEVICES="evdev keyboard mouse"
CPU_FLAGS_X86="aes avx avx2 mmx mmxext sse sse2 sse3 sse4_1 sse4_2 ssse3"
ALSA_CARDS="ens1371"

# Language targets
PYTHON_TARGETS="python3_12"
PYTHON_SINGLE_TARGET="python3_12"
RUBY_TARGETS="ruby33"
LUA_TARGETS="lua5-4"
LUA_SINGLE_TARGET="lua5-4"
